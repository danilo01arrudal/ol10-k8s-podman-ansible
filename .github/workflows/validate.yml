---
name: Ansible Validation on Oracle Linux 10

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible and ansible-lint
        run: |
          sudo dnf install -y ansible || true
          pip3 install ansible-lint --user
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install ansible.posix

      - name: Lint playbook
        run: ansible-lint ansible/k8s-cluster-prep.yml

      - name: Syntax check
        run: ansible-playbook ansible/k8s-cluster-prep.yml --syntax-check -i ansible/inventory.ini

      - name: Dry-run (check mode) with sudo
        env:
          ANSIBLE_BECOME_PASS: ${{ secrets.SUDO_PASSWORD }}
        run: |
          ansible-playbook ansible/k8s-cluster-prep.yml \
            --check \
            -i ansible/inventory.ini \
            --extra-vars "ansible_become_pass=$ANSIBLE_BECOME_PASS"
