name: GPU Validation
on:
  workflow_dispatch:

jobs:
  test-gpu:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Ensure GPU node label exists
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl label node exated feature.node.kubernetes.io/gpu=nvidia --overwrite"

      - name: Copy GPU test manifest to master
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            manifests/gpu-test-pod.yaml root@192.168.0.40:/tmp/

      - name: Apply GPU test pod
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl apply -f /tmp/gpu-test-pod.yaml"

      - name: Wait for pod to complete (manual loop)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 << 'EOF'
            TIMEOUT=120
            INTERVAL=5
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              PHASE=$(kubectl get pod gpu-validation-pod -o jsonpath='{.status.phase}')
              echo "Current phase: $PHASE"
              if [ "$PHASE" = "Succeeded" ] || [ "$PHASE" = "Completed" ]; then
                echo "Pod completed successfully."
                exit 0
              elif [ "$PHASE" = "Failed" ] || [ "$PHASE" = "Unknown" ]; then
                echo "Pod failed with phase: $PHASE"
                exit 1
              fi
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done
            echo "Timed out waiting for pod to complete."
            exit 1
          EOF

      - name: Show pod logs
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl logs gpu-validation-pod"

      - name: Debug on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl describe pod gpu-validation-pod"
