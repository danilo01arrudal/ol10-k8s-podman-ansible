name: GPU Validation
on:
  workflow_dispatch:

jobs:
  test-gpu:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Copy GPU test manifest to master
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            manifests/gpu-test-pod.yaml root@192.168.0.40:/tmp/

      - name: Apply GPU test pod via SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl apply -f /tmp/gpu-test-pod.yaml"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl wait --for=condition=ready pod/gpu-validation-pod --timeout=60s"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@192.168.0.40 \
            "kubectl logs gpu-validation-pod"
