name: Cluster Health Check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Deploy Kubernetes Cluster"]
    types:
      - completed

jobs:
  health:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 192.168.0.40 >> ~/.ssh/known_hosts

      - name: Check nodes via SSH
        run: |
          ssh -o StrictHostKeyChecking=no root@192.168.0.40 "kubectl get nodes -o wide"
          ssh -o StrictHostKeyChecking=no root@192.168.0.40 "kubectl get pods -n kube-system"

      - name: Check GPU availability via SSH
        run: |
          ssh -o StrictHostKeyChecking=no root@192.168.0.40 "kubectl get nodes -o json | jq '.items[] | {name:.metadata.name, gpu:.status.allocatable.\"nvidia.com/gpu\"}'"
