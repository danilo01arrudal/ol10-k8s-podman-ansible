apiVersion: v1
kind: Pod
metadata:
  name: gpu-validation-pod
  namespace: default
  labels:
    app: gpu-test
spec:
  restartPolicy: Never
  containers:
  - name: cuda-vector-add
    image: nvidia/samples:vectoradd-cuda11.6.0
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
  nodeSelector:
    feature.node.kubernetes.io/gpu: nvidia
